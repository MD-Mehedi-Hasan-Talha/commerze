<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --dark: #242424;
        --gray: #828282;
        --accent: #f26363;
        --light-gray: #f4f4f4;
        --green: #70e0a3;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "JetBrains Mono", monospace;
      }

      body {
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }

      .app {
        background: white;
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.15);
      }

      /* ========== PAGES ========== */
      .page {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        overflow-y: auto;
        transition:
          transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.35s;
        -webkit-overflow-scrolling: touch;
      }

      .page.hidden {
        transform: translateX(100%);
        opacity: 0;
        pointer-events: none;
      }

      /* ========== LISTING PAGE ========== */
      #listing-page header {
        padding: 50px 20px 15px;
        display: flex;
        gap: 12px;
        align-items: center;
        position: sticky;
        top: 0;
        background: white;
        z-index: 10;
      }

      .search-wrap {
        flex: 1;
        background: var(--light-gray);
        border-radius: 14px;
        padding: 13px 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .search-wrap input {
        border: none;
        background: transparent;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--dark);
        outline: none;
        width: 100%;
      }

      .search-wrap input::placeholder {
        color: var(--gray);
      }

      .filter-btn {
        background: var(--dark);
        color: white;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        border: none;
        transition: transform 0.15s;
      }
      .filter-btn:active {
        transform: scale(0.92);
      }

      /* Categories */
      .categories {
        display: flex;
        overflow-x: auto;
        padding: 10px 20px 20px;
        gap: 16px;
        scrollbar-width: none;
      }
      .categories::-webkit-scrollbar {
        display: none;
      }

      .cat-item {
        text-align: center;
        font-size: 11px;
        color: var(--gray);
        min-width: 65px;
        cursor: pointer;
        transition: color 0.2s;
        user-select: none;
      }

      .cat-circle {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: var(--light-gray);
        margin-bottom: 8px;
        border: 2.5px solid transparent;
        background-size: cover;
        background-position: center;
        transition:
          border-color 0.2s,
          transform 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        overflow: hidden;
      }

      .cat-item.active .cat-circle {
        border-color: var(--accent);
        transform: scale(1.05);
      }
      .cat-item.active span {
        color: var(--accent);
        font-weight: 700;
      }

      /* Product Grid */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        padding: 0 16px 110px;
      }

      .card {
        position: relative;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .card:active {
        transform: scale(0.97);
      }

      .img-box {
        width: 100%;
        aspect-ratio: 1/1;
        background: var(--light-gray);
        border-radius: 22px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .img-box img {
        width: 85%;
        height: 85%;
        object-fit: contain;
        transition: transform 0.3s;
      }
      .card:hover .img-box img {
        transform: scale(1.05);
      }

      .badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: var(--green);
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
      }

      .best-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: var(--dark);
        color: white;
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
      }

      .card-info {
        margin-top: 10px;
        padding: 0 4px;
      }
      .card-price {
        font-weight: 700;
        font-size: 15px;
      }
      .card-old-price {
        text-decoration: line-through;
        color: var(--gray);
        font-size: 12px;
        margin-left: 5px;
      }
      .card-title {
        color: var(--gray);
        font-size: 12px;
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .no-results {
        grid-column: 1/-1;
        text-align: center;
        padding: 60px 20px;
        color: var(--gray);
        font-size: 14px;
      }

      /* Bottom Nav */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        max-width: 430px;
        background: white;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 18px 30px;
        border-top: 1px solid #f0f0f0;
        z-index: 20;
      }

      .nav-icon {
        font-size: 22px;
        cursor: pointer;
        opacity: 0.35;
        transition:
          opacity 0.2s,
          transform 0.2s;
        position: relative;
      }
      .nav-icon.active {
        opacity: 1;
      }
      .nav-icon:active {
        transform: scale(0.88);
      }

      .cart-badge {
        position: absolute;
        top: -6px;
        right: -8px;
        background: var(--accent);
        color: white;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }

      /* ========== DETAIL PAGE ========== */
      #detail-page {
        display: flex;
        flex-direction: column;
      }

      .detail-topbar {
        padding: 50px 20px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: var(--light-gray);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        border: none;
        transition:
          transform 0.15s,
          background 0.2s;
      }
      .icon-btn:active {
        transform: scale(0.9);
      }
      .icon-btn.liked {
        background: #ffe5e5;
      }

      .detail-image-area {
        background: var(--light-gray);
        margin: 0 16px;
        border-radius: 28px;
        padding: 40px 30px 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
      }

      .detail-main-img {
        width: 80%;
        max-height: 220px;
        object-fit: contain;
        transform: rotate(-5deg);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.12));
      }
      .detail-main-img:hover {
        transform: rotate(0deg) scale(1.05);
      }

      .img-dots {
        display: flex;
        gap: 7px;
        margin-top: 25px;
      }
      .img-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ddd;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .img-dot.active {
        background: var(--gray);
        transform: scale(1.3);
      }

      .detail-content {
        padding: 25px 20px 140px;
        flex: 1;
      }

      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
      }

      .detail-title {
        font-size: 22px;
        font-weight: 700;
        flex: 1;
      }
      .detail-rating {
        color: #f2a93b;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
        margin-left: 10px;
      }

      .detail-desc {
        font-size: 13px;
        color: var(--gray);
        line-height: 1.7;
        margin-bottom: 20px;
        max-height: 65px;
        overflow: hidden;
        transition: max-height 0.35s;
      }
      .detail-desc.expanded {
        max-height: 400px;
      }

      .read-more-btn {
        color: var(--accent);
        font-weight: 700;
        cursor: pointer;
        font-size: 13px;
        font-family: "JetBrains Mono", monospace;
        border: none;
        background: none;
        padding: 0;
        margin-bottom: 20px;
        display: block;
      }

      .thumbs-row {
        display: flex;
        gap: 12px;
        margin-top: 5px;
      }

      .thumb {
        width: 62px;
        height: 62px;
        border-radius: 14px;
        background: var(--light-gray);
        border: 2.5px solid transparent;
        cursor: pointer;
        background-size: cover;
        background-position: center;
        transition:
          border-color 0.2s,
          transform 0.2s;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }
      .thumb.active {
        border-color: var(--accent);
      }
      .thumb:active {
        transform: scale(0.92);
      }

      .detail-footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        max-width: 430px;
        background: white;
        padding: 18px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid #f5f5f5;
        z-index: 20;
      }

      .price-col .old-price {
        text-decoration: line-through;
        color: var(--gray);
        font-size: 13px;
      }
      .price-col .new-price {
        font-size: 24px;
        font-weight: 700;
      }

      .qty-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-right: 15px;
      }
      .qty-btn {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1.5px solid #eee;
        background: white;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s;
        font-family: "JetBrains Mono", monospace;
      }
      .qty-btn:active {
        background: var(--light-gray);
      }
      .qty-num {
        font-size: 15px;
        font-weight: 700;
        min-width: 20px;
        text-align: center;
      }

      .add-btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 16px 30px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
        transition:
          transform 0.15s,
          background 0.2s;
        white-space: nowrap;
      }
      .add-btn:active {
        transform: scale(0.95);
      }
      .add-btn.added {
        background: #70e0a3;
        color: var(--dark);
      }

      /* ========== CART PAGE ========== */
      #cart-page header {
        padding: 50px 20px 20px;
        font-size: 20px;
        font-weight: 700;
      }

      .cart-list {
        padding: 0 16px;
        padding-bottom: 120px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .cart-item {
        display: flex;
        gap: 14px;
        align-items: center;
        background: var(--light-gray);
        border-radius: 18px;
        padding: 14px;
      }

      .cart-item-img {
        width: 70px;
        height: 70px;
        border-radius: 12px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 28px;
        overflow: hidden;
      }
      .cart-item-img img {
        width: 90%;
        height: 90%;
        object-fit: contain;
      }

      .cart-item-info {
        flex: 1;
      }
      .cart-item-name {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .cart-item-price {
        font-size: 13px;
        color: var(--accent);
        font-weight: 700;
      }

      .cart-item-qty {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .cart-qty-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1.5px solid #ddd;
        background: white;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
      }
      .cart-qty-num {
        font-size: 14px;
        font-weight: 700;
        min-width: 18px;
        text-align: center;
      }

      .cart-remove {
        color: var(--gray);
        cursor: pointer;
        font-size: 18px;
        padding: 5px;
        transition: color 0.2s;
      }
      .cart-remove:hover {
        color: var(--accent);
      }

      .cart-empty {
        text-align: center;
        padding: 80px 20px;
        color: var(--gray);
      }
      .cart-empty .empty-icon {
        font-size: 60px;
        margin-bottom: 15px;
      }
      .cart-empty p {
        font-size: 14px;
      }

      .cart-footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        max-width: 430px;
        background: white;
        padding: 18px 20px;
        border-top: 1px solid #f0f0f0;
        z-index: 20;
      }
      .cart-total {
        display: flex;
        justify-content: space-between;
        margin-bottom: 14px;
        font-size: 14px;
      }
      .cart-total-val {
        font-weight: 700;
        font-size: 18px;
        color: var(--accent);
      }
      .checkout-btn {
        width: 100%;
        background: var(--dark);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
        transition: transform 0.15s;
      }
      .checkout-btn:active {
        transform: scale(0.98);
      }

      /* Toast */
      .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-80px);
        background: var(--dark);
        color: white;
        padding: 12px 22px;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 500;
        z-index: 100;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        white-space: nowrap;
        max-width: 90vw;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- TOAST -->
      <div class="toast" id="toast"></div>

      <!-- ===== LISTING PAGE ===== -->
      <div class="page" id="listing-page">
        <header>
          <div class="search-wrap">
            <span style="font-size: 16px; color: var(--gray)">🔍</span>
            <input
              type="text"
              id="searchInput"
              placeholder="Search products..."
              oninput="handleSearch()"
            />
          </div>
          <button class="filter-btn" onclick="showToast('Filter coming soon!')">
            ⚙️
          </button>
        </header>

        <div class="categories" id="categoryRow"></div>
        <div class="grid" id="productGrid"></div>

        <nav class="bottom-nav">
          <div class="nav-icon" onclick="switchNav('home')">🏠</div>
          <div class="nav-icon active" onclick="switchNav('shop')">🛍️</div>
          <div class="nav-icon" onclick="switchNav('fav')">♡</div>
          <div class="nav-icon" onclick="goCart()" id="cartNavIcon">
            🛒
            <div class="cart-badge" id="cartBadge" style="display: none">0</div>
          </div>
        </nav>
      </div>

      <!-- ===== DETAIL PAGE ===== -->
      <div class="page hidden" id="detail-page">
        <div class="detail-topbar">
          <button class="icon-btn" onclick="goBack()">←</button>
          <div style="display: flex; gap: 10px">
            <button class="icon-btn" id="likeBtn" onclick="toggleLike()">
              ♡
            </button>
            <button class="icon-btn" onclick="shareProduct()">📤</button>
          </div>
        </div>

        <div class="detail-image-area">
          <img id="detailMainImg" src="" alt="" class="detail-main-img" />
          <div class="img-dots" id="imgDots"></div>
        </div>

        <div class="detail-content">
          <div class="detail-header">
            <h1 class="detail-title" id="detailTitle"></h1>
            <span class="detail-rating" id="detailRating"></span>
          </div>
          <p class="detail-desc" id="detailDesc"></p>
          <button
            class="read-more-btn"
            id="readMoreBtn"
            onclick="toggleReadMore()"
          >
            Read more ↓
          </button>

          <div class="thumbs-row" id="thumbsRow"></div>
        </div>

        <div class="detail-footer">
          <div class="price-col">
            <p class="old-price" id="detailOldPrice"></p>
            <p class="new-price" id="detailNewPrice"></p>
          </div>
          <div class="qty-row">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-num" id="qtyNum">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <button class="add-btn" id="addToCartBtn" onclick="addToCart()">
            Add to cart
          </button>
        </div>
      </div>

      <!-- ===== CART PAGE ===== -->
      <div class="page hidden" id="cart-page">
        <header>
          <div style="display: flex; align-items: center; gap: 12px">
            <button class="icon-btn" onclick="goBack()">←</button>
            My Cart
          </div>
        </header>

        <div class="cart-list" id="cartList"></div>

        <div class="cart-footer">
          <div class="cart-total">
            <span>Total</span>
            <span class="cart-total-val" id="cartTotal">$0.00</span>
          </div>
          <button class="checkout-btn" onclick="checkout()">Checkout →</button>
        </div>
      </div>
    </div>

          reviewCount: 203,
          img: "https://m.media-amazon.com/images/I/61GcrnFTN3L._AC_SL1500_.jpg",
          imgs: [
            "https://m.media-amazon.com/images/I/61GcrnFTN3L._AC_SL1500_.jpg",
          ],
          desc: "Minimalist LED desk lamp with touch dimmer and 5 color temperature settings from warm candlelight to cool daylight. USB-C charging port on the base. Memory function remembers your last setting.",
          badge: "21%",
          bestPrice: false,
        },
        {
          id: 6,
          name: "Nordic Side Table",
          price: 149,
          oldPrice: null,
          category: "furniture",
          rating: 4.8,
          reviewCount: 76,
          img: "https://m.media-amazon.com/images/I/71Sb0fJnlpL._AC_SL1500_.jpg",
          imgs: [
            "https://m.media-amazon.com/images/I/71Sb0fJnlpL._AC_SL1500_.jpg",
          ],
          desc: "Solid oak side table with a powder-coated metal frame. Simple, clean Scandinavian design that fits any interior. Easy to assemble. Dimensions: 45cm diameter, 55cm height. Available in natural oak and walnut finish.",
          badge: null,
          bestPrice: true,
        },
      ];

      // ============================
      // STATE
      // ============================
      let activeCategory = "all";
      let searchQuery = "";
      let cart = [];
      let liked = new Set();
      let currentProduct = null;
      let currentQty = 1;
      let currentImgIndex = 0;
      let pageStack = ["listing-page"];

      // ============================
      // INIT
      // ============================
      function init() {
        renderCategories();
        renderProducts();
        updateCartBadge();
      }

      // ============================
      // CATEGORIES
      // ============================
      function renderCategories() {
        const row = document.getElementById("categoryRow");
        row.innerHTML = categories
          .map(
            (c) => `
        <div class="cat-item ${c.id === activeCategory ? "active" : ""}" onclick="selectCategory('${c.id}')">
            <div class="cat-circle">${c.icon}</div>
            <span>${c.name}</span>
        </div>
    `,
          )
          .join("");
      }

      function selectCategory(id) {
        activeCategory = id;
        renderCategories();
        renderProducts();
      }

      // ============================
      // SEARCH
      // ============================
      function handleSearch() {
        searchQuery = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();
        renderProducts();
      }

      // ============================
      // PRODUCTS
      // ============================
      function renderProducts() {
        const grid = document.getElementById("productGrid");
        let filtered = products;

        if (activeCategory !== "all") {
          filtered = filtered.filter((p) => p.category === activeCategory);
        }
        if (searchQuery) {
          filtered = filtered.filter(
            (p) =>
              p.name.toLowerCase().includes(searchQuery) ||
              p.desc.toLowerCase().includes(searchQuery),
          );
        }

        if (filtered.length === 0) {
          grid.innerHTML = `<div class="no-results">😕<br><br>No products found</div>`;
          return;
        }

        grid.innerHTML = filtered
          .map(
            (p) => `
        <div class="card" onclick="openProduct(${p.id})">
            ${p.bestPrice ? `<div class="best-badge">Best price</div>` : ""}
            ${p.badge ? `<div class="badge">${p.badge}</div>` : ""}
            <div class="img-box">
                <img src="${p.img}" alt="${p.name}" loading="lazy"
                    onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=font-size:40px>📦</span>'">
            </div>
            <div class="card-info">
                <p class="card-price">$${p.price.toFixed(2)}${p.oldPrice ? `<span class="card-old-price">$${p.oldPrice.toFixed(2)}</span>` : ""}</p>
                <p class="card-title">${p.name}</p>
            </div>
        </div>
    `,
          )
          .join("");
      }

      // ============================
      // NAVIGATION
      // ============================
      function showPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.add("hidden"));
        document.getElementById(id).classList.remove("hidden");
        document.getElementById(id).scrollTop = 0;
      }

      function pushPage(id) {
        pageStack.push(id);
        showPage(id);
      }

      function goBack() {
        if (pageStack.length > 1) {
          pageStack.pop();
          showPage(pageStack[pageStack.length - 1]);
        }
      }

      function goCart() {
        renderCart();
        pushPage("cart-page");
      }

      function switchNav(tab) {
        if (tab === "home" || tab === "fav") {
          showToast(
            tab === "home" ? "Home coming soon!" : "Favourites coming soon!",
          );
          return;
        }
        if (tab === "shop") {
          pageStack = ["listing-page"];
          showPage("listing-page");
        }
      }

      // ============================
      // PRODUCT DETAIL
      // ============================
      function openProduct(id) {
        currentProduct = products.find((p) => p.id === id);
        currentQty = 1;
        currentImgIndex = 0;
        renderDetail();
        pushPage("detail-page");
      }

      function renderDetail() {
        const p = currentProduct;
        document.getElementById("detailMainImg").src = p.imgs[0];
        document.getElementById("detailMainImg").alt = p.name;
        document.getElementById("detailTitle").textContent = p.name;
        document.getElementById("detailRating").textContent =
          `★ ${p.rating} (${p.reviewCount})`;
        document.getElementById("detailDesc").textContent = p.desc;
        document.getElementById("detailDesc").classList.remove("expanded");
        document.getElementById("readMoreBtn").textContent = "Read more ↓";

        if (p.oldPrice) {
          document.getElementById("detailOldPrice").textContent =
            `$${p.oldPrice.toFixed(2)}`;
        } else {
          document.getElementById("detailOldPrice").textContent = "";
        }
        document.getElementById("detailNewPrice").textContent =
          `$${p.price.toFixed(2)}`;
        document.getElementById("qtyNum").textContent = 1;

        const likeBtn = document.getElementById("likeBtn");
        likeBtn.textContent = liked.has(p.id) ? "❤️" : "♡";
        likeBtn.className = "icon-btn" + (liked.has(p.id) ? " liked" : "");

        // Add to cart btn
        const btn = document.getElementById("addToCartBtn");
        btn.textContent = "Add to cart";
        btn.className = "add-btn";

        // Thumbnails
        const thumbsRow = document.getElementById("thumbsRow");
        thumbsRow.innerHTML = p.imgs
          .map(
            (img, i) => `
        <div class="thumb ${i === 0 ? "active" : ""}"
            style="background-image: url('${img}')"
            onclick="selectThumb(${i})">
        </div>
    `,
          )
          .join("");

        // Dots
        const dotsRow = document.getElementById("imgDots");
        dotsRow.innerHTML = p.imgs
          .map(
            (_, i) => `
        <div class="img-dot ${i === 0 ? "active" : ""}" onclick="selectThumb(${i})"></div>
    `,
          )
          .join("");
      }

      function selectThumb(i) {
        currentImgIndex = i;
        const p = currentProduct;
        document.getElementById("detailMainImg").src = p.imgs[i];

        // Update thumbs
        document.querySelectorAll(".thumb").forEach((t, idx) => {
          t.className = "thumb" + (idx === i ? " active" : "");
          if (p.imgs[idx]) t.style.backgroundImage = `url('${p.imgs[idx]}')`;
        });

        // Update dots
        document.querySelectorAll(".img-dot").forEach((d, idx) => {
          d.className = "img-dot" + (idx === i ? " active" : "");
        });
      }

      function toggleReadMore() {
        const desc = document.getElementById("detailDesc");
        const btn = document.getElementById("readMoreBtn");
        const expanded = desc.classList.toggle("expanded");
        btn.textContent = expanded ? "Read less ↑" : "Read more ↓";
      }

      function toggleLike() {
        if (!currentProduct) return;
        const id = currentProduct.id;
        if (liked.has(id)) {
          liked.delete(id);
        } else {
          liked.add(id);
        }
        const btn = document.getElementById("likeBtn");
        btn.textContent = liked.has(id) ? "❤️" : "♡";
        btn.className = "icon-btn" + (liked.has(id) ? " liked" : "");
        showToast(
          liked.has(id) ? "❤️ Added to favourites" : "Removed from favourites",
        );
      }

      function shareProduct() {
        if (navigator.share) {
          navigator.share({
            title: currentProduct.name,
            text: `Check out ${currentProduct.name} for $${currentProduct.price}`,
          });
        } else {
          showToast("📋 Link copied!");
        }
      }

      function changeQty(delta) {
        currentQty = Math.max(1, currentQty + delta);
        document.getElementById("qtyNum").textContent = currentQty;
      }

      // ============================
      // CART
      // ============================
      function addToCart() {
        const p = currentProduct;
        const existing = cart.find((i) => i.id === p.id);
        if (existing) {
          existing.qty += currentQty;
        } else {
          cart.push({ ...p, qty: currentQty });
        }

        const btn = document.getElementById("addToCartBtn");
        btn.textContent = "✓ Added!";
        btn.className = "add-btn added";
        setTimeout(() => {
          btn.textContent = "Add to cart";
          btn.className = "add-btn";
        }, 1500);

        updateCartBadge();
        showToast(`🛒 ${p.name} added to cart`);
      }

      function updateCartBadge() {
        const total = cart.reduce((s, i) => s + i.qty, 0);
        const badge = document.getElementById("cartBadge");
        badge.textContent = total;
        badge.style.display = total > 0 ? "flex" : "none";
      }

      function renderCart() {
        const list = document.getElementById("cartList");

        if (cart.length === 0) {
          list.innerHTML = `
            <div class="cart-empty">
                <div class="empty-icon">🛒</div>
                <p>Your cart is empty</p>
            </div>
        `;
          document.getElementById("cartTotal").textContent = "$0.00";
          return;
        }

        list.innerHTML = cart
          .map(
            (item, idx) => `
        <div class="cart-item">
            <div class="cart-item-img">
                <img src="${item.img}" alt="${item.name}"
                    onerror="this.style.display='none'; this.parentElement.textContent='📦'">
            </div>
            <div class="cart-item-info">
                <p class="cart-item-name">${item.name}</p>
                <p class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</p>
            </div>
            <div class="cart-item-qty">
                <button class="cart-qty-btn" onclick="updateCartQty(${idx}, -1)">−</button>
                <span class="cart-qty-num">${item.qty}</span>
                <button class="cart-qty-btn" onclick="updateCartQty(${idx}, 1)">+</button>
            </div>
            <span class="cart-remove" onclick="removeFromCart(${idx})">✕</span>
        </div>
    `,
          )
          .join("");

        const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
        document.getElementById("cartTotal").textContent =
          `$${total.toFixed(2)}`;
      }

      function updateCartQty(idx, delta) {
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) {
          cart.splice(idx, 1);
        }
        updateCartBadge();
        renderCart();
      }

      function removeFromCart(idx) {
        const name = cart[idx].name;
        cart.splice(idx, 1);
        updateCartBadge();
        renderCart();
        showToast(`Removed ${name}`);
      }

      function checkout() {
        if (cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
        showToast(`🎉 Order placed! Total: $${total.toFixed(2)}`);
        cart = [];
        updateCartBadge();
        renderCart();
      }

      // ============================
      // TOAST
      // ============================
      let toastTimer;
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
      }

      // ============================
      // START
      // ============================
      init();
    </script>
  </body>
</html>
